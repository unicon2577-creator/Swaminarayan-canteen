<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaminarayan Canteen | Ordering System</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --light: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 800px; margin: 20px auto; padding: 15px; }
        
        /* Menu Styling */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        /* Cart & Admin Toggle */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid var(--primary); border-radius: 20px; }
        .active { background: var(--primary); color: white; }
        .hidden { display: none; }

        /* Admin Table */
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: var(--dark); color: white; }
        .status-paid { color: green; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Swaminarayan Canteen</h1>
    <p>Contact: 96246 01096 | UPI: dpruthviraj675@okicici</p>
</header>

<div class="container">
    <div class="nav-tabs">
        <div id="customerTab" class="tab-btn active" onclick="showPage('customer')">Customer Menu</div>
        <div id="adminTab" class="tab-btn" onclick="showPage('admin')">Admin Panel</div>
    </div>

    <div id="customerPage">
        <h3>Menu Categories</h3>
        <div class="menu-grid" id="menuItems">
            </div>

        <div id="cartSection" style="margin-top: 30px; border-top: 2px solid #ddd; padding-top: 20px;">
            <h3>Your Cart</h3>
            <div id="cartList">Cart is empty</div>
            <h4 id="totalAmount">Total: ₹0</h4>
            <button class="btn" style="background: #27ae60;" onclick="proceedToPayment()">Proceed to Payment</button>
        </div>
    </div>

    <div id="adminPage" class="hidden">
        <h2>Admin Dashboard</h2>
        <div id="stats" style="display:flex; gap: 20px; margin-bottom: 20px;">
            <div class="card">Total Sales: <b id="totalSalesDisplay">₹0</b></div>
            <div class="card">Orders: <b id="totalOrdersDisplay">0</b></div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="adminOrderTable"></tbody>
        </table>
        <button class="btn" onclick="clearData()" style="background:red; margin-top:20px;">Reset All Data</button>
    </div>
</div>

<script>
    // 1. Data Mockup
    const menu = [
        { id: 1, name: "Gujarati Thali", price: 120, img: "https://via.placeholder.com/150" },
        { id: 2, name: "Masala Dosa", price: 60, img: "https://via.placeholder.com/150" },
        { id: 3, name: "Cold Coffee", price: 40, img: "https://via.placeholder.com/150" }
    ];

    let cart = [];
    let orders = JSON.parse(localStorage.getItem('canteenOrders')) || [];

    // 2. Render Menu
    function renderMenu() {
        const menuDiv = document.getElementById('menuItems');
        menuDiv.innerHTML = menu.map(item => `
            <div class="card">
                <img src="${item.img}" alt="${item.name}">
                <h4>${item.name}</h4>
                <p>₹${item.price}</p>
                <button class="btn" onclick="addToCart(${item.id})">Add to Cart</button>
            </div>
        `).join('');
    }

    // 3. Cart Logic
    function addToCart(id) {
        const item = menu.find(m => m.id === id);
        cart.push(item);
        updateCartUI();
    }

    function updateCartUI() {
        const cartList = document.getElementById('cartList');
        const totalDisp = document.getElementById('totalAmount');
        if(cart.length === 0) { cartList.innerHTML = "Empty"; return; }
        
        cartList.innerHTML = cart.map((item, idx) => `<div>${item.name} - ₹${item.price}</div>`).join('');
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        totalDisp.innerText = `Total: ₹${total}`;
    }

    // 4. Payment Flow
    function proceedToPayment() {
        if(cart.length === 0) return alert("Cart is empty!");
        const total = cart.reduce((sum, item) => sum + item.price, 0);

        Swal.fire({
            title: 'Payment Required',
            html: `<p>Please pay <b>₹${total}</b> to:</p>
                   <h3 style="color:blue">dpruthviraj675@okicici</h3>
                   <p>After paying, click the button below.</p>`,
            showCancelButton: true,
            confirmButtonText: 'I Have Paid',
            icon: 'info'
        }).then((result) => {
            if (result.isConfirmed) {
                confirmOrder(total);
            }
        });
    }

    function confirmOrder(total) {
        const newOrder = {
            id: 'ORD' + Math.floor(Math.random() * 1000),
            items: cart.map(i => i.name).join(', '),
            amount: total,
            status: 'Paid',
            customer: 'Guest User'
        };
        orders.push(newOrder);
        localStorage.setItem('canteenOrders', JSON.stringify(orders));
        cart = [];
        updateCartUI();
        
        // Notification Sound Simulation
        new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
        
        Swal.fire('Success', 'Your order has been placed! Admin notified.', 'success');
        renderAdmin();
    }

    // 5. Admin Logic
    function renderAdmin() {
        const table = document.getElementById('adminOrderTable');
        const totalSales = orders.reduce((sum, o) => sum + o.amount, 0);
        
        document.getElementById('totalSalesDisplay').innerText = `₹${totalSales}`;
        document.getElementById('totalOrdersDisplay').innerText = orders.length;

        table.innerHTML = orders.map(o => `
            <tr>
                <td>${o.id}</td>
                <td>${o.customer}</td>
                <td>${o.items}</td>
                <td>₹${o.amount}</td>
                <td class="status-paid">${o.status}</td>
            </tr>
        `).reverse().join('');
    }

    // Navigation Logic
    function showPage(page) {
        if(page === 'admin') {
            document.getElementById('adminPage').classList.remove('hidden');
            document.getElementById('customerPage').classList.add('hidden');
            document.getElementById('adminTab').classList.add('active');
            document.getElementById('customerTab').classList.remove('active');
            renderAdmin();
        } else {
            document.getElementById('customerPage').classList.remove('hidden');
            document.getElementById('adminPage').classList.add('hidden');
            document.getElementById('customerTab').classList.add('active');
            document.getElementById('adminTab').classList.remove('active');
        }
    }

    function clearData() {
        localStorage.removeItem('canteenOrders');
        orders = [];
        renderAdmin();
    }

    // Initialize
    renderMenu();
</script>
</body>
</html>
